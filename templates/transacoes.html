<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Getsêmani - Lançar Transações</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; display: flex; }
        .sidebar { width: 250px; height: 100vh; background-color: #1a1e29; color: #fff; padding-top: 20px; position: fixed; }
        .sidebar h2 { text-align: center; margin-bottom: 5px; }
        .sidebar a { display: block; color: #a0a5b5; padding: 15px 25px; text-decoration: none; }
        .sidebar a:hover { background-color: #242936; color: #fff; }
        .main-content { margin-left: 250px; padding: 40px; width: calc(100% - 250px); box-sizing: border-box; }
        .form-container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        .form-group label { font-weight: bold; margin-bottom: 5px; color: #333; }
        .form-group input, .form-group select { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; }
        .btn-enviar { padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; }
        .btn-enviar:hover { background: #27ae60; }
        .secao-form { display: none; margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
        .alert-sucesso { background: #2ecc71; color: white; padding: 15px; border-radius: 6px; margin-bottom: 20px; }
    </style>
    <script>
        function alternarAbas() {
            var tipo = document.getElementById("tipo_transacao").value;
            document.getElementById("aba_dizimo").style.display = tipo === "dizimo" ? "block" : "none";
            document.getElementById("aba_oferta").style.display = tipo === "oferta" ? "block" : "none";
            document.getElementById("aba_despesa").style.display = tipo === "despesa" ? "block" : "none";
        }
    </script>
</head>
<body>

    <div class="sidebar">
        <h2>GETSÊMANI</h2>
        <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo" style="width: 85px; height: 85px; display: block; margin: 15px auto; border-radius: 50%;">
        <a href="/dashboard">Dashboard</a>
        <a href="/dizimistas">Dizimistas Fiéis</a>
        <a href="/ministerios">Ministérios</a>
        <a href="/transacoes">Lançar Transações</a>
        <a href="/configuracoes">Configurações</a>
    </div>

    <div class="main-content">
        <h2>Lançar Nova Movimentação Financeira</h2>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert-sucesso">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <div class="form-container">
            <form action="/transacoes" method="POST">
                <div class="form-group">
                    <label>Selecione o Tipo de Transação</label>
                    <select id="tipo_transacao" name="tipo_transacao" onchange="alternarAbas()" required>
                        <option value="">-- Escolha uma Opção --</option>
                        <option value="dizimo">Dízimo (Identificado)</option>
                        <option value="oferta">Oferta (Anônima)</option>
                        <option value="despesa">Saída / Despesa (Plano de Contas)</option>
                    </select>
                </div>

                <div id="aba_dizimo" class="secao-form">
                    <div class="form-group">
                        <label>Nome do Dizimista Fiel</label>
                        <input type="text" name="dizimista_nome" placeholder="Ex: João da Silva">
                    </div>
                    <div class="form-group">
                        <label>Valor do Dízimo (R$)</label>
                        <input type="number" step="0.01" name="dizimo_valor" placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label>Ministério Vinculado</label>
                        <input type="text" name="dizimo_ministerio" placeholder="Ex: Sede, Congregação Norte">
                    </div>
                </div>

                <div id="aba_oferta" class="secao-form">
                    <div class="form-group">
                        <label>Valor da Oferta Anônima (R$)</label>
                        <input type="number" step="0.01" name="oferta_valor" placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label>Culto Correspondente</label>
                        <select name="oferta_culto">
                            <option value="Domingo">Culto de Domingo</option>
                            <option value="Ensino">Culto de Ensino / Terça</option>
                            <option value="Jovens">Culto de Jovens</option>
                            <option value="Outros">Outros Eventos</option>
                        </select>
                    </div>
                </div>

                <div id="aba_despesa" class="secao-form">
                    <div class="form-group">
                        <label>Categoria da Conta (Plano de Contas)</label>
                        <select name="despesa_categoria">
                            <option value="Conta de Luz">Conta de Luz (Enel/Light)</option>
                            <option value="Conta de Água">Conta de Água (Cedae/Saneamento)</option>
                            <option value="Internet">Internet / Telefone</option>
                            <option value="Aluguel">Aluguel do Templo</option>
                            <option value="Equipamentos/Patrimônio">Equipamentos / Instrumentos (Gera Patrimônio)</option>
                            <option value="Ação Social">Ação Social / Cestas Básicas</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Valor Pago (R$)</label>
                        <input type="number" step="0.01" name="despesa_valor" placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label>Descrição / Observação</label>
                        <input type="text" name="despesa_descricao" placeholder="Ex: Compra de mesa de som ou conta ref ao mês de Julho">
                    </div>
                </div>

                <button type="submit" class="btn-enviar" style="margin-top: 15px;">Salvar Lançamento</button>
            </form>
        </div>
    </div>

</body>
</html>
