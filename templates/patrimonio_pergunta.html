<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Getsêmani - Cadastro de Patrimônio</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #1a1e29; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; }
        .box-patrimonio { background-color: #2c3240; padding: 40px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.3); width: 100%; max-width: 450px; }
        h2 { margin-top: 0; color: #2ecc71; font-size: 22px; text-align: center; }
        p { color: #a0a5b5; font-size: 14px; line-height: 1.5; text-align: center; margin-bottom: 25px; }
        .dados-compra { background: #1a1e29; padding: 15px; border-radius: 6px; margin-bottom: 20px; border-left: 4px solid #2ecc71; }
        .dados-compra span { display: block; font-size: 14px; color: #b0b5c5; margin-bottom: 5px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        .form-group label { font-size: 13px; color: #a0a5b5; margin-bottom: 5px; font-weight: bold; }
        .form-group input { padding: 12px; border: 1px solid #444c5e; border-radius: 6px; background-color: #1a1e29; color: white; font-size: 15px; }
        .form-group input:focus { outline: none; border-color: #2ecc71; }
        .btn-salvar { width: 100%; padding: 12px; background-color: #2ecc71; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-salvar:hover { background-color: #27ae60; }
    </style>
</head>
<body>

    <div class="box-patrimonio">
        <h2>Detetamos um Equipamento!</h2>
        <p>Identificamos que lançaste um gasto com Equipamento/Patrimônio. Preenche os dados abaixo para darmos entrada no inventário oficial da igreja.</p>
        
        <div class="dados-compra">
            <span><strong>Item pré-lançado:</strong> {{ item.item }}</span>
            <span><strong>Valor investido:</strong> R$ {{ "%.2f"|format(item.valor) }}</span>
        </div>

        <form action="/patrimonio/novo" method="POST">
            <input type="hidden" name="patrimonio_item" value="{{ item.item }}">
            <input type="hidden" name="patrimonio_valor" value="{{ item.valor }}">

            <div class="form-group">
                <label>Número de Série / Código do Produto</label>
                <input type="text" name="patrimonio_serie" required placeholder="Ex: SN-987456123-X">
            </div>

            <div class="form-group">
                <label>Localização / Onde vai ficar guardado?</label>
                <input type="text" name="patrimonio_local" required placeholder="Ex: Templo Principal, Sala de Som, Ministério Infantil">
            </div>

            <div class="form-group">
                <label>Anexar Nota Fiscal (Simulação)</label>
                <input type="text" disabled placeholder="Nota Fiscal vinculada automaticamente" style="background: #242936; color: #666; cursor: not-allowed;">
            </div>

            <button type="submit" class="btn-salvar">Concluir Tombamento de Patrimônio</button>
        </form>
    </div>

</body>
</html>
