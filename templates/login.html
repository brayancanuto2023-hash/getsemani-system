<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Getsêmani - Login</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #1a1e29;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container {
            background-color: #2c3240;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 380px;
            text-align: center;
            color: white;
        }
        .login-container h2 {
            margin-bottom: 10px;
            font-size: 24px;
            letter-spacing: 1px;
        }
        .login-container p {
            color: #a0a5b5;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            color: #a0a5b5;
            font-size: 13px;
            margin-bottom: 6px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #444c5e;
            border-radius: 6px;
            background-color: #1a1e29;
            color: white;
            font-size: 15px;
            box-sizing: border-box;
        }
        .input-group input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .btn-entrar {
            width: 100%;
            padding: 12px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-entrar:hover {
            background-color: #2563eb;
        }
        .alert {
            background-color: #ef4444;
            color: white;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>GETSÊMANI</h2>
        <p>Ecossistema de Gestão Eclesiástica</p>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <div class="input-group">
                <label>Utilizador</label>
                <input type="text" name="login" required placeholder="Digite o seu utilizador">
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" name="senha" required placeholder="Digite a sua senha">
            </div>
            <button type="submit" class="btn-entrar">Entrar no Sistema</button>
        </form>
    </div>

</body>
</html>
